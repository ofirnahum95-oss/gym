<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FitPro - מעקב אימונים</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 20px;
            padding-bottom: 100px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 32px;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #007AFF, #5AC8FA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        
        .section {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section h2 {
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .workout-card {
            background: rgba(0, 122, 255, 0.08);
            border: 1px solid rgba(0, 122, 255, 0.2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .workout-card h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #007AFF;
        }
        
        .workout-card .details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            font-size: 13px;
            margin-top: 12px;
        }
        
        .detail-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }
        
        .detail-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .detail-value {
            font-weight: 600;
            font-size: 14px;
        }
        
        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #007AFF, #0051BA);
            color: white;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #007AFF;
            border: 1px solid rgba(0, 122, 255, 0.3);
        }
        
        .btn-secondary:active {
            background: rgba(0, 122, 255, 0.2);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #34C759, #00B54B);
            color: white;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #007AFF;
            background: rgba(0, 122, 255, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: monospace;
            font-size: 14px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 24px;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            width: 100%;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h3 {
            font-size: 20px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }
        
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin: 4px 0;
        }
        
        .badge-new {
            background: rgba(34, 197, 89, 0.2);
            color: #34C759;
        }
        
        .badge-existing {
            background: rgba(0, 122, 255, 0.2);
            color: #007AFF;
        }
        
        .badge-change {
            background: rgba(255, 149, 0, 0.2);
            color: #FF9500;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .empty-state p {
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        
        .stat-value {
            font-weight: 600;
            font-size: 16px;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #34C759;
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        
        .changes-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .change-item {
            background: rgba(255, 149, 0, 0.08);
            border-left: 3px solid #FF9500;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
        }
        
        .change-item strong {
            color: #FF9500;
        }
    </style>
</head>
<body dir="rtl">
    <div class="container">
        <header>
            <h1>💪 FitPro</h1>
            <p>מעקב אימונים עם מאמן אישי</p>
        </header>
        
        <!-- Weekly Workout -->
        <div class="section">
            <h2>📅 האימון השבועי שלך</h2>
            <div id="weekly-workout">
                <div class="empty-state">
                    <p>עדיין אין אימון בשבוע</p>
                    <p style="font-size: 12px;">העתק הודעת מאמן כדי להתחיל</p>
                </div>
            </div>
        </div>
        
        <!-- Add Workout -->
        <div class="section">
            <h2>📝 הוסף אימון חדש</h2>
            <textarea id="coach-message" placeholder="הדבק כאן את הודעת המאמן מ-WhatsApp..."></textarea>
            <button class="btn btn-primary" onclick="analyzeWorkout()">🤖 ניתוח אימון</button>
        </div>
        
        <!-- Changes Report -->
        <div class="section">
            <h2>📊 שינויים מהשבוע שעבר</h2>
            <div id="changes-summary">
                <div class="empty-state">
                    <p>אף שינויים עדיין</p>
                </div>
            </div>
            <button class="btn btn-success" onclick="sendToCoach()" id="send-btn" style="display:none;">💬 שלח למאמן</button>
            <button class="btn btn-secondary" onclick="copyChanges()" id="copy-btn" style="display:none;">📋 העתק</button>
        </div>
        
        <!-- Settings -->
        <div class="section">
            <h2>⚙️ הגדרות</h2>
            <p style="font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 12px;">Firebase: ✅ מחובר</p>
            <input type="password" id="api-key" placeholder="Claude API Key (אופציונלי)" style="margin-bottom: 0;">
            <button class="btn btn-secondary" onclick="saveAPIKey()" style="margin-top: 12px;">שמור מפתח</button>
        </div>
    </div>
    
    <!-- Import Review Modal -->
    <div id="import-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📋 בדוק את התרגילים</h3>
                <button class="close-btn" onclick="closeModal('import-modal')">×</button>
            </div>
            <div id="import-list"></div>
            <button class="btn btn-primary" onclick="saveWorkout()" style="margin-top: 20px;">✅ שמור הכל</button>
            <button class="btn btn-secondary" onclick="closeModal('import-modal')">ביטול</button>
        </div>
    </div>
    
    <!-- Edit Exercise Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ עדכון תרגיל</h3>
                <button class="close-btn" onclick="closeModal('edit-modal')">×</button>
            </div>
            <div class="input-group">
                <label>שם:</label>
                <input type="text" id="edit-name" disabled style="opacity: 0.6;">
            </div>
            <div class="input-group">
                <label>סטים:</label>
                <input type="number" id="edit-sets" min="1" max="10">
            </div>
            <div class="input-group">
                <label>חזרות:</label>
                <input type="number" id="edit-reps" min="1" max="50">
            </div>
            <div class="input-group">
                <label>משקל (ק״ג):</label>
                <input type="number" id="edit-weight" step="0.5" min="0">
            </div>
            <button class="btn btn-primary" onclick="saveEditedExercise()" style="margin-top: 20px;">✅ שמור שינוי</button>
            <button class="btn btn-secondary" onclick="closeModal('edit-modal')">ביטול</button>
        </div>
    </div>

    <script>
        console.log('FitPro initialized');
        
        const DB_URL = 'https://gymo-2093a-default-rtdb.firebaseio.com';
        let workouts = [];
        let editingIndex = null;
        
        // Open edit modal
        function editExercise(idx) {
            editingIndex = idx;
            const latestWorkout = workouts[workouts.length - 1];
            const ex = latestWorkout.exercises[idx];
            
            document.getElementById('edit-name').value = ex.name;
            document.getElementById('edit-sets').value = ex.sets;
            document.getElementById('edit-reps').value = ex.reps;
            document.getElementById('edit-weight').value = ex.weight;
            
            openModal('edit-modal');
        }
        
        // Save edited exercise
        async function saveEditedExercise() {
            if (editingIndex === null) return;
            
            const latestWorkout = workouts[workouts.length - 1];
            const ex = latestWorkout.exercises[editingIndex];
            
            const oldSets = ex.sets;
            const oldReps = ex.reps;
            const oldWeight = ex.weight;
            
            ex.sets = parseInt(document.getElementById('edit-sets').value);
            ex.reps = parseInt(document.getElementById('edit-reps').value);
            ex.weight = parseFloat(document.getElementById('edit-weight').value);
            
            // Track change
            if (!ex.history) ex.history = [];
            ex.history.push({
                date: new Date().toISOString(),
                sets: oldSets,
                reps: oldReps,
                weight: oldWeight
            });
            
            await saveData('/workouts', workouts);
            closeModal('edit-modal');
            renderWeekly();
            generateChanges();
            showToast('✅ עדכון שמור!');
        }
        
        // Fetch from Firebase
        async function fetchData(path) {
            try {
                const url = `${DB_URL}${path}.json`;
                console.log('Fetching from:', url);
                
                const res = await fetch(url);
                console.log('Fetch response status:', res.status);
                
                if (!res.ok) {
                    console.error('Fetch failed:', res.status);
                    return null;
                }
                
                const data = await res.json();
                console.log('Fetched data:', data);
                return data;
            } catch(e) {
                console.error('Fetch error:', e);
                return null;
            }
        }
        
        // Save to Firebase
        async function saveData(path, data) {
            try {
                console.log('Saving to', path, data);
                const url = `${DB_URL}${path}.json`;
                console.log('URL:', url);
                
                const res = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                console.log('Response status:', res.status);
                
                if (res.ok) {
                    const result = await res.json();
                    console.log('Save success:', result);
                    return result;
                } else {
                    console.error('Save failed:', res.status, res.statusText);
                }
            } catch(e) {
                console.error('Save error:', e);
                showToast('❌ שגיאה בשמירה: ' + e.message);
            }
            return null;
        }
        
        // Parse Hebrew workout
        function parseWorkout(text) {
            console.log('parseWorkout called with:', text);
            
            const lines = text.split('\n').filter(l => l.trim());
            console.log('Lines:', lines);
            
            const workout = [];
            
            lines.forEach((line, idx) => {
                if (!line.trim() || line.length < 3) {
                    console.log(`Skipping line ${idx}: too short`);
                    return;
                }
                
                // Check for superset (contains +)
                let isSupersetLine = line.includes('+');
                console.log(`Line ${idx} is superset:`, isSupersetLine);
                
                if (isSupersetLine) {
                    // Split by + to get two exercises
                    const parts = line.split('+').map(p => p.trim());
                    console.log('Superset parts:', parts);
                    
                    parts.forEach((part, partIdx) => {
                        const ex = parseExercisePart(part, partIdx === 0);
                        if (ex) {
                            ex.superset = true;
                            workout.push(ex);
                            console.log('Added superset exercise:', ex);
                        }
                    });
                } else {
                    // Regular single exercise
                    const ex = parseExercisePart(line, false);
                    if (ex) {
                        workout.push(ex);
                        console.log('Added regular exercise:', ex);
                    }
                }
            });
            
            console.log('Final workout array:', workout);
            return workout;
        }
        
        // Parse a single exercise part
        function parseExercisePart(part, isFirst) {
            const match = part.match(/(\d+)[×x](\d+)/);
            console.log(`Parsing "${part.substring(0, 30)}..." - match:`, match);
            
            if (!match) {
                console.log('No reps/sets match found');
                return null;
            }
            
            const [, reps, sets] = match;
            const weightMatch = part.match(/\((\d+\.?\d*)\)?/);
            const weight = weightMatch ? parseFloat(weightMatch[1]) : 0;
            
            let name = part
                .replace(/\d+[×x]\d+/g, '')
                .replace(/\(\d+\.?\d*\)?/g, '')
                .trim();
            
            console.log(`Extracted: name="${name}", sets=${sets}, reps=${reps}, weight=${weight}`);
            
            if (name.length > 2) {
                return {
                    name: name,
                    sets: parseInt(sets),
                    reps: parseInt(reps),
                    weight: weight,
                    superset: false
                };
            }
            
            return null;
        }
        
        // Analyze workout
        function analyzeWorkout() {
            const text = document.getElementById('coach-message').value.trim();
            console.log('analyzeWorkout called with text:', text);
            
            if (!text) {
                showToast('⚠️ הדבק הודעה');
                return;
            }
            
            currentWorkout = parseWorkout(text);
            console.log('Parsed workout:', currentWorkout);
            
            if (currentWorkout.length === 0) {
                showToast('❌ לא נמצאו תרגילים');
                return;
            }
            
            renderImportReview();
            openModal('import-modal');
        }
        
        // Render import review
        function renderImportReview() {
            let html = '';
            let i = 0;
            
            while (i < currentWorkout.length) {
                const ex = currentWorkout[i];
                
                if (ex.superset && i + 1 < currentWorkout.length && currentWorkout[i + 1].superset) {
                    // Render superset pair
                    const ex1 = currentWorkout[i];
                    const ex2 = currentWorkout[i + 1];
                    
                    html += `
                        <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 16px;">
                            <div class="workout-card" style="margin-bottom: 0;">
                                <h3>${ex1.name}</h3>
                                <div class="details">
                                    <div class="detail-item">
                                        <div class="detail-label">סטים</div>
                                        <input type="number" value="${ex1.sets}" onchange="currentWorkout[${i}].sets = parseInt(this.value)" style="width: 100%; margin: 0;">
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">חזרות</div>
                                        <input type="number" value="${ex1.reps}" onchange="currentWorkout[${i}].reps = parseInt(this.value)" style="width: 100%; margin: 0;">
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">משקל</div>
                                        <input type="number" step="0.5" value="${ex1.weight}" onchange="currentWorkout[${i}].weight = parseFloat(this.value)" style="width: 100%; margin: 0;">
                                    </div>
                                </div>
                            </div>
                            
                            <div style="text-align: center;">
                                <div style="background: rgba(255,149,0,0.2); color: #FF9500; padding: 12px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; white-space: nowrap;">⚡ SUPER SET</div>
                            </div>
                            
                            <div class="workout-card" style="margin-bottom: 0;">
                                <h3>${ex2.name}</h3>
                                <div class="details">
                                    <div class="detail-item">
                                        <div class="detail-label">סטים</div>
                                        <input type="number" value="${ex2.sets}" onchange="currentWorkout[${i+1}].sets = parseInt(this.value)" style="width: 100%; margin: 0;">
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">חזרות</div>
                                        <input type="number" value="${ex2.reps}" onchange="currentWorkout[${i+1}].reps = parseInt(this.value)" style="width: 100%; margin: 0;">
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">משקל</div>
                                        <input type="number" step="0.5" value="${ex2.weight}" onchange="currentWorkout[${i+1}].weight = parseFloat(this.value)" style="width: 100%; margin: 0;">
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    i += 2;
                } else {
                    // Regular single exercise
                    html += `<div class="workout-card">
                        <h3>${ex.name}</h3>
                        <div class="details">
                            <div class="detail-item">
                                <div class="detail-label">סטים</div>
                                <input type="number" value="${ex.sets}" onchange="currentWorkout[${i}].sets = parseInt(this.value)" style="width: 100%; margin: 0;">
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">חזרות</div>
                                <input type="number" value="${ex.reps}" onchange="currentWorkout[${i}].reps = parseInt(this.value)" style="width: 100%; margin: 0;">
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">משקל</div>
                                <input type="number" step="0.5" value="${ex.weight}" onchange="currentWorkout[${i}].weight = parseFloat(this.value)" style="width: 100%; margin: 0;">
                            </div>
                        </div>
                    </div>`;
                    i += 1;
                }
            }
            
            document.getElementById('import-list').innerHTML = html;
        }
        
        // Save workout
        async function saveWorkout() {
            console.log('saveWorkout called');
            console.log('currentWorkout:', currentWorkout);
            
            const newWorkout = {
                id: 'workout-' + Date.now(),
                date: new Date().toISOString(),
                exercises: currentWorkout
            };
            
            console.log('newWorkout object:', newWorkout);
            
            workouts.push(newWorkout);
            console.log('workouts array after push:', workouts);
            
            const saved = await saveData('/workouts', workouts);
            console.log('saveData returned:', saved);
            
            closeModal('import-modal');
            document.getElementById('coach-message').value = '';
            renderWeekly();
            generateChanges();
            showToast('✅ שמור בהצלחה!');
        }
        
        // Render weekly workout - only latest with edit buttons
        function renderWeekly() {
            if (workouts.length === 0) {
                document.getElementById('weekly-workout').innerHTML = `
                    <div class="empty-state">
                        <p>עדיין אין אימון בשבוע</p>
                        <p style="font-size: 12px;">העתק הודעת מאמן כדי להתחיל</p>
                    </div>`;
                return;
            }
            
            const latestWorkout = workouts[workouts.length - 1];
            let html = '';
            let i = 0;
            
            while (i < latestWorkout.exercises.length) {
                const ex = latestWorkout.exercises[i];
                
                if (ex.superset && i + 1 < latestWorkout.exercises.length && latestWorkout.exercises[i + 1].superset) {
                    // Render superset pair
                    const ex1 = latestWorkout.exercises[i];
                    const ex2 = latestWorkout.exercises[i + 1];
                    
                    html += `
                        <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 16px;">
                            <div class="workout-card" style="margin-bottom: 0; position: relative;">
                                <button onclick="editExercise(${i})" style="position: absolute; top: 12px; left: 12px; background: rgba(0,122,255,0.2); border: none; color: #007AFF; padding: 4px 8px; border-radius: 6px; font-size: 12px; cursor: pointer;">✏️</button>
                                <h3>${ex1.name}</h3>
                                <div class="details">
                                    <div class="detail-item">
                                        <div class="detail-label">סטים</div>
                                        <div class="detail-value">${ex1.sets}</div>
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">חזרות</div>
                                        <div class="detail-value">${ex1.reps}</div>
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">משקל</div>
                                        <div class="detail-value">${ex1.weight}ק״ג</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div style="text-align: center;">
                                <div style="background: rgba(255,149,0,0.2); color: #FF9500; padding: 12px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; white-space: nowrap;">⚡ SUPER SET</div>
                            </div>
                            
                            <div class="workout-card" style="margin-bottom: 0; position: relative;">
                                <button onclick="editExercise(${i + 1})" style="position: absolute; top: 12px; left: 12px; background: rgba(0,122,255,0.2); border: none; color: #007AFF; padding: 4px 8px; border-radius: 6px; font-size: 12px; cursor: pointer;">✏️</button>
                                <h3>${ex2.name}</h3>
                                <div class="details">
                                    <div class="detail-item">
                                        <div class="detail-label">סטים</div>
                                        <div class="detail-value">${ex2.sets}</div>
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">חזרות</div>
                                        <div class="detail-value">${ex2.reps}</div>
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">משקל</div>
                                        <div class="detail-value">${ex2.weight}ק״ג</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    i += 2;
                } else {
                    // Regular single exercise
                    html += `
                        <div class="workout-card" style="position: relative;">
                            <button onclick="editExercise(${i})" style="position: absolute; top: 12px; left: 12px; background: rgba(0,122,255,0.2); border: none; color: #007AFF; padding: 4px 8px; border-radius: 6px; font-size: 12px; cursor: pointer;">✏️</button>
                            <h3>${ex.name}</h3>
                            <div class="details">
                                <div class="detail-item">
                                    <div class="detail-label">סטים</div>
                                    <div class="detail-value">${ex.sets}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">חזרות</div>
                                    <div class="detail-value">${ex.reps}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">משקל</div>
                                    <div class="detail-value">${ex.weight}ק״ג</div>
                                </div>
                            </div>
                        </div>
                    `;
                    i += 1;
                }
            }
            
            document.getElementById('weekly-workout').innerHTML = html;
        }
        
        // Generate changes report
        function generateChanges() {
            if (workouts.length === 0) {
                document.getElementById('changes-summary').innerHTML = `
                    <div class="empty-state">
                        <p>אף שינויים עדיין</p>
                    </div>`;
                document.getElementById('send-btn').style.display = 'none';
                document.getElementById('copy-btn').style.display = 'none';
                return null;
            }
            
            const latestWorkout = workouts[workouts.length - 1];
            let changedExercises = [];
            let i = 0;
            
            while (i < latestWorkout.exercises.length) {
                const ex = latestWorkout.exercises[i];
                
                if (ex.superset && i + 1 < latestWorkout.exercises.length && latestWorkout.exercises[i + 1].superset) {
                    const ex1 = latestWorkout.exercises[i];
                    const ex2 = latestWorkout.exercises[i + 1];
                    
                    if (ex1.history && ex1.history.length > 0) {
                        const lastHistory = ex1.history[ex1.history.length - 1];
                        if (lastHistory.weight !== ex1.weight || lastHistory.reps !== ex1.reps || lastHistory.sets !== ex1.sets) {
                            changedExercises.push({
                                name: ex1.name,
                                sets: ex1.sets,
                                reps: ex1.reps,
                                weight: ex1.weight,
                                oldWeight: lastHistory.weight,
                                oldReps: lastHistory.reps,
                                isSuperset: true
                            });
                        }
                    }
                    
                    if (ex2.history && ex2.history.length > 0) {
                        const lastHistory = ex2.history[ex2.history.length - 1];
                        if (lastHistory.weight !== ex2.weight || lastHistory.reps !== ex2.reps || lastHistory.sets !== ex2.sets) {
                            changedExercises.push({
                                name: ex2.name,
                                sets: ex2.sets,
                                reps: ex2.reps,
                                weight: ex2.weight,
                                oldWeight: lastHistory.weight,
                                oldReps: lastHistory.reps,
                                isSuperset: true
                            });
                        }
                    }
                    
                    i += 2;
                } else {
                    if (ex.history && ex.history.length > 0) {
                        const lastHistory = ex.history[ex.history.length - 1];
                        if (lastHistory.weight !== ex.weight || lastHistory.reps !== ex.reps || lastHistory.sets !== ex.sets) {
                            changedExercises.push({
                                name: ex.name,
                                sets: ex.sets,
                                reps: ex.reps,
                                weight: ex.weight,
                                oldWeight: lastHistory.weight,
                                oldReps: lastHistory.reps
                            });
                        }
                    }
                    i += 1;
                }
            }
            
            if (changedExercises.length === 0) {
                document.getElementById('changes-summary').innerHTML = `
                    <div class="empty-state">
                        <p>אף שינויים עדיין</p>
                    </div>`;
                document.getElementById('send-btn').style.display = 'none';
                document.getElementById('copy-btn').style.display = 'none';
                return null;
            }
            
            let report = 'היי 🙋‍♂️\n\nהנה השינויים מהשבוע:\n\n';
            
            changedExercises.forEach(ex => {
                if (ex.weight > 0) {
                    const weightChange = ex.weight > ex.oldWeight ? `⬆️ ${ex.oldWeight}→${ex.weight}` : `${ex.weight}`;
                    const repsChange = ex.reps > ex.oldReps ? `⬆️ ${ex.oldReps}→${ex.reps}` : `${ex.reps}`;
                    
                    if (ex.isSuperset) {
                        report += `  💪 ${ex.name}\n     משקל: ${weightChange}ק״ג | חזרות: ${repsChange}\n`;
                    } else {
                        report += `💪 ${ex.name}\n   משקל: ${weightChange}ק״ג | חזרות: ${repsChange}\n\n`;
                    }
                }
            });
            
            report += 'נמשיך ככה! 💪';
            
            document.getElementById('send-btn').style.display = 'block';
            document.getElementById('copy-btn').style.display = 'block';
            document.getElementById('changes-summary').innerHTML = `<div class="changes-list">${report.replace(/\n/g, '<br>')}</div>`;
            
            return report;
        }
        
        // Send to coach
        function sendToCoach() {
            if (workouts.length === 0) {
                showToast('אף אימונים');
                return;
            }
            
            const latestWorkout = workouts[workouts.length - 1];
            let changedExercises = [];
            let i = 0;
            
            while (i < latestWorkout.exercises.length) {
                const ex = latestWorkout.exercises[i];
                
                if (ex.superset && i + 1 < latestWorkout.exercises.length && latestWorkout.exercises[i + 1].superset) {
                    const ex1 = latestWorkout.exercises[i];
                    const ex2 = latestWorkout.exercises[i + 1];
                    
                    if (ex1.history && ex1.history.length > 0) {
                        const lastHistory = ex1.history[ex1.history.length - 1];
                        if (lastHistory.weight !== ex1.weight || lastHistory.reps !== ex1.reps || lastHistory.sets !== ex1.sets) {
                            changedExercises.push({
                                name: ex1.name,
                                sets: ex1.sets,
                                reps: ex1.reps,
                                weight: ex1.weight,
                                oldWeight: lastHistory.weight,
                                oldReps: lastHistory.reps
                            });
                        }
                    }
                    
                    if (ex2.history && ex2.history.length > 0) {
                        const lastHistory = ex2.history[ex2.history.length - 1];
                        if (lastHistory.weight !== ex2.weight || lastHistory.reps !== ex2.reps || lastHistory.sets !== ex2.sets) {
                            changedExercises.push({
                                name: ex2.name,
                                sets: ex2.sets,
                                reps: ex2.reps,
                                weight: ex2.weight,
                                oldWeight: lastHistory.weight,
                                oldReps: lastHistory.reps
                            });
                        }
                    }
                    
                    i += 2;
                } else {
                    if (ex.history && ex.history.length > 0) {
                        const lastHistory = ex.history[ex.history.length - 1];
                        if (lastHistory.weight !== ex.weight || lastHistory.reps !== ex.reps || lastHistory.sets !== ex.sets) {
                            changedExercises.push({
                                name: ex.name,
                                sets: ex.sets,
                                reps: ex.reps,
                                weight: ex.weight,
                                oldWeight: lastHistory.weight,
                                oldReps: lastHistory.reps
                            });
                        }
                    }
                    i += 1;
                }
            }
            
            let report = 'היי 🙋‍♂️\n\nהנה השינויים מהשבוע:\n\n';
            
            if (changedExercises.length > 0) {
                changedExercises.forEach(ex => {
                    if (ex.weight > 0) {
                        const weightChange = ex.weight > ex.oldWeight ? `⬆️ ${ex.oldWeight}→${ex.weight}` : `${ex.weight}`;
                        const repsChange = ex.reps > ex.oldReps ? `⬆️ ${ex.oldReps}→${ex.reps}` : `${ex.reps}`;
                        report += `💪 ${ex.name}\n   משקל: ${weightChange}ק״ג | חזרות: ${repsChange}\n\n`;
                    }
                });
            } else {
                report += 'אף שינויים עדיין\n\n';
            }
            
            report += 'נמשיך ככה! 💪';
            
            const encoded = encodeURIComponent(report);
            window.location.href = `https://wa.me/?text=${encoded}`;
        }
        
        // Copy to clipboard
        function copyChanges() {
            if (workouts.length === 0) {
                showToast('אף אימונים');
                return;
            }
            
            const latestWorkout = workouts[workouts.length - 1];
            let report = 'היי 🙋‍♂️\n\nהנה השינויים מהשבוע:\n\n';
            let i = 0;
            
            while (i < latestWorkout.exercises.length) {
                const ex = latestWorkout.exercises[i];
                
                if (ex.superset && i + 1 < latestWorkout.exercises.length && latestWorkout.exercises[i + 1].superset) {
                    const ex1 = latestWorkout.exercises[i];
                    const ex2 = latestWorkout.exercises[i + 1];
                    
                    report += `⚡ SUPERSET:\n`;
                    if (ex1.weight > 0) {
                        report += `  💪 ${ex1.name}\n     משקל: ${ex1.weight}ק״ג | חזרות: ${ex1.reps}x${ex1.sets}\n`;
                    }
                    if (ex2.weight > 0) {
                        report += `  💪 ${ex2.name}\n     משקל: ${ex2.weight}ק״ג | חזרות: ${ex2.reps}x${ex2.sets}\n`;
                    }
                    report += '\n';
                    i += 2;
                } else {
                    if (ex.weight > 0) {
                        report += `💪 ${ex.name}\n   משקל: ${ex.weight}ק״ג | חזרות: ${ex.reps}x${ex.sets}\n\n`;
                    }
                    i += 1;
                }
            }
            
            report += 'נמשיך ככה! 💪';
            
            navigator.clipboard.writeText(report).then(() => {
                showToast('✅ הועתק!');
            });
        }
        
        // Modal
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        // Toast
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // Save API Key
        function saveAPIKey() {
            const key = document.getElementById('api-key').value;
            if (key) {
                localStorage.setItem('api-key', key);
                showToast('✅ שמור!');
            }
        }
        
        // Init
        async function init() {
            console.log('Init started');
            const data = await fetchData('/workouts');
            console.log('fetchData returned:', data);
            
            if (data) {
                workouts = Array.isArray(data) ? data : Object.values(data);
                console.log('workouts loaded:', workouts);
                renderWeekly();
                generateChanges();
            } else {
                console.log('No data returned from Firebase');
            }
        }
        
        window.addEventListener('load', init);
    </script>
</body>
</html>
