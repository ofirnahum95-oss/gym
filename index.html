<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FitPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 16px;
        }
        
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #007AFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #appContent {
            display: none;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        
        .nav-item {
            flex: 1;
            height: 100%;
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        
        .nav-item.active {
            color: #007AFF;
        }
        
        .page {
            display: none;
            padding: 20px;
            padding-bottom: 80px;
        }
        
        .page.active {
            display: block;
        }
        
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        
        .btn-primary {
            background: #007AFF;
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #007AFF;
        }
        
        h1 { font-size: 28px; margin-bottom: 8px; }
        h2 { font-size: 18px; margin-top: 20px; margin-bottom: 12px; }
        h3 { font-size: 16px; margin-bottom: 4px; }
        
        .card {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        
        .input-group {
            margin-bottom: 12px;
        }
        
        .input-group label {
            display: block;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 6px;
            font-weight: 600;
        }
        
        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,122,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        
        textarea {
            resize: vertical;
            font-family: monospace;
        }
    </style>
</head>
<body dir="rtl">
    <div id="loadingScreen" style="display:flex;">
        <div class="spinner"></div>
        <p>טוען FitPro...</p>
    </div>
    
    <div id="appContent">
        <nav class="navbar" id="navbar">
            <button class="nav-item active" onclick="switchPage('dashboard')">📊 לוח</button>
            <button class="nav-item" onclick="switchPage('exercises')">💪 תרגילים</button>
            <button class="nav-item" onclick="switchPage('import')">📝 הוספה</button>
            <button class="nav-item" onclick="switchPage('analytics')">📈 סטטיסטיקה</button>
            <button class="nav-item" onclick="switchPage('settings')">⚙️ הגדרות</button>
        </nav>
        
        <div id="dashboard" class="page active">
            <h1>💪 FitPro</h1>
            <p style="color: rgba(255,255,255,0.7); margin-bottom: 16px;">עוקב אימונים אישי</p>
            <button class="btn btn-primary" onclick="addExercise()">➕ הוסף תרגיל</button>
            <div id="exercises-list" style="margin-top: 16px;"></div>
        </div>
        
        <div id="exercises" class="page">
            <h1>🏋️ תרגילים</h1>
            <div id="exercises-display"></div>
        </div>
        
        <div id="import" class="page">
            <h1>📝 הוספה</h1>
            <div class="input-group">
                <label>הדבק הודעה:</label>
                <textarea id="import-text" placeholder="הדבק כאן..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="importWorkout()">📊 ניתוח</button>
        </div>
        
        <div id="analytics" class="page">
            <h1>📈 סטטיסטיקה</h1>
            <p id="stats"></p>
        </div>
        
        <div id="settings" class="page">
            <h1>⚙️ הגדרות</h1>
            <div class="card">
                <h3>Firebase</h3>
                <p style="font-size: 13px; color: rgba(255,255,255,0.7);">✅ מחובר</p>
            </div>
        </div>
    </div>

    <script>
        console.log('✅ Script loaded');
        
        const DB_URL = 'https://baby-88eb0-default-rtdb.firebaseio.com';
        let exercises = {};
        let sessions = {};
        
        function switchPage(page) {
            try {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(page).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                event.target.classList.add('active');
            } catch(e) {
                console.error('switchPage error:', e);
            }
        }
        
        async function fetchData(path) {
            try {
                const res = await fetch(`${DB_URL}${path}.json`);
                if (!res.ok) return null;
                return await res.json();
            } catch(e) {
                console.error('fetchData error:', e);
                return null;
            }
        }
        
        async function putData(path, data) {
            try {
                const res = await fetch(`${DB_URL}${path}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) return null;
                return await res.json();
            } catch(e) {
                console.error('putData error:', e);
                return null;
            }
        }
        
        function addExercise() {
            const name = prompt('שם התרגיל:');
            if (!name) return;
            
            const id = 'ex-' + Date.now();
            exercises[id] = {
                name: name,
                muscleGroup: 'חזה',
                sets: 4,
                minReps: 6,
                maxReps: 10,
                targetWeight: 0
            };
            
            putData('/exercises', exercises);
            renderExercises();
            alert('✅ נוסף!');
        }
        
        function renderExercises() {
            try {
                const list = document.getElementById('exercises-list');
                const display = document.getElementById('exercises-display');
                
                if (Object.keys(exercises).length === 0) {
                    list.innerHTML = '<p>אין תרגילים</p>';
                    display.innerHTML = '<p>אין תרגילים</p>';
                    return;
                }
                
                let html = '';
                for (const [id, ex] of Object.entries(exercises)) {
                    html += `<div style="padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px;">
                        <h3>${ex.name}</h3>
                        <p style="font-size: 13px; color: rgba(255,255,255,0.6);">${ex.sets} סטים • ${ex.minReps}-${ex.maxReps} חזרות</p>
                    </div>`;
                }
                
                list.innerHTML = html;
                display.innerHTML = html;
            } catch(e) {
                console.error('renderExercises error:', e);
            }
        }
        
        function importWorkout() {
            const text = document.getElementById('import-text').value;
            if (!text) {
                alert('הדבק תוכנית');
                return;
            }
            alert('וקיבלת: ' + text.substring(0, 50));
        }
        
        async function init() {
            try {
                console.log('Init starting...');
                
                const exData = await fetchData('/exercises');
                console.log('Exercises:', exData);
                exercises = exData || {};
                
                const sesData = await fetchData('/sessions');
                console.log('Sessions:', sesData);
                sessions = sesData || {};
                
                renderExercises();
                
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                
                console.log('✅ Init complete!');
            } catch(e) {
                console.error('Init error:', e);
                console.error('Stack:', e.stack);
                document.getElementById('loadingScreen').innerHTML = '<p>Error: ' + e.message + '</p>';
            }
        }
        
        window.addEventListener('load', function() {
            console.log('Window load event');
            init();
        });
    </script>
</body>
</html>
