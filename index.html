<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FitPro - מעקב אימונים</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #16161a 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }
        
        header h1 {
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #007AFF, #5AC8FA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 0.3px;
        }
        
        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .section h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .workout-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
            transition: transform 0.2s ease;
        }

        .superset-container {
            background: rgba(255, 149, 0, 0.04);
            border: 1px dashed rgba(255, 149, 0, 0.3);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 14px;
        }

        .superset-badge {
            background: rgba(255, 149, 0, 0.15);
            color: #FF9500;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 10px;
            margin-right: 4px;
        }
        
        .workout-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fff;
            padding-left: 35px; /* מניעת דריסה של כפתור העריכה */
        }
        
        .workout-card .details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .detail-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 6px;
            border-radius: 12px;
            text-align: center;
        }
        
        .detail-label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            margin-bottom: 4px;
            font-weight: 500;
        }
        
        .detail-value {
            font-weight: 700;
            font-size: 15px;
            color: #007AFF;
        }
        
        .btn {
            padding: 15px 20px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #007AFF;
            color: white;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
            background: #0066d6;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #007AFF;
            border: 1px solid rgba(0, 122, 255, 0.2);
        }
        
        .btn-secondary:active {
            background: rgba(0, 122, 255, 0.15);
        }
        
        .btn-success {
            background: #34C759;
            color: white;
        }

        .btn-success:active {
            background: #2cb04e;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #007AFF;
            background: rgba(0, 122, 255, 0.05);
        }
        
        textarea {
            resize: none;
            min-height: 100px;
            font-size: 15px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: flex-end; /* פתיחה מלמטה בסגנון מובייל Native */
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1c1c1e;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            width: 100%;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
            animation: slideUp 0.25s cubic-bezier(0.15, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .modal-header h3 {
            font-size: 19px;
            font-weight: 700;
        }
        
        .close-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .stepper-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stepper-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 20px;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
        }

        .stepper-container input {
            margin-bottom: 0;
            text-align: center;
            font-weight: 600;
        }
        
        .edit-trigger {
            position: absolute; 
            top: 12px; 
            left: 12px; 
            background: rgba(255,255,255,0.06); 
            border: 1px solid rgba(255,255,255,0.08); 
            color: #007AFF; 
            width: 32px;
            height: 32px;
            border-radius: 10px; 
            font-size: 14px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .empty-state {
            text-align: center;
            padding: 30px 10px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .empty-state p {
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #34C759;
            color: white;
            padding: 14px 24px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            z-index: 2000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .changes-list {
            max-height: 250px;
            overflow-y: auto;
            font-size: 14px;
            background: rgba(0,0,0,0.15);
            padding: 12px;
            border-radius: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body dir="rtl">
    <div class="container">
        <header>
            <h1>💪 FitPro</h1>
            <p>מעקב אימונים עם מאמן אישי</p>
        </header>
        
        <!-- Weekly Workout -->
        <div class="section">
            <h2>📅 האימון השבועי שלך</h2>
            <div id="weekly-workout">
                <div class="empty-state">
                    <p>עדיין אין אימון בשבוע</p>
                    <p style="font-size: 12px;">העתק הודעת מאמן כדי להתחיל</p>
                </div>
            </div>
        </div>
        
        <!-- Add Workout -->
        <div class="section">
            <h2>📝 הוסף אימון חדש</h2>
            <textarea id="coach-message" placeholder="הדבק כאן את הודעת המאמן מ-WhatsApp..."></textarea>
            <button class="btn btn-primary" onclick="analyzeWorkout()">🤖 ניתוח אימון</button>
        </div>
        
        <!-- Changes Report -->
        <div class="section">
            <h2>📊 שינויים מהשבוע שעבר</h2>
            <div id="changes-summary">
                <div class="empty-state">
                    <p>אין שינויים מתועדים עדיין</p>
                </div>
            </div>
            <div style="margin-top: 14px; display: flex; gap: 10px;">
                <button class="btn btn-success" onclick="sendToCoach()" id="send-btn" style="display:none; flex: 2; margin-bottom: 0;">💬 שלח למאמן</button>
                <button class="btn btn-secondary" onclick="copyChanges()" id="copy-btn" style="display:none; flex: 1; margin-bottom: 0;">📋 העתק</button>
            </div>
        </div>
        
        <!-- Settings -->
        <div class="section">
            <h2>⚙️ הגדרות</h2>
            <p style="font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 12px;">Firebase: 🟢 מחובר בהצלחה</p>
            <input type="password" id="api-key" placeholder="Claude API Key (אופציונלי)" style="margin-bottom: 12px;">
            <button class="btn btn-secondary" onclick="saveAPIKey()" style="margin-bottom: 0;">שמור מפתח</button>
        </div>
    </div>
    
    <!-- Import Review Modal -->
    <div id="import-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📋 אישור תרגילי האימון</h3>
                <button class="close-btn" onclick="closeModal('import-modal')">×</button>
            </div>
            <div id="import-list"></div>
            <div style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveWorkout()">✅ שמור הכל</button>
                <button class="btn btn-secondary" onclick="closeModal('import-modal')" style="margin-bottom: 0;">ביטול</button>
            </div>
        </div>
    </div>
    
    <!-- Edit Exercise Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ עדכון ביצוע תרגיל</h3>
                <button class="close-btn" onclick="closeModal('edit-modal')">×</button>
            </div>
            
            <div class="input-group">
                <label>שם התרגיל:</label>
                <input type="text" id="edit-name" disabled style="opacity: 0.5; background: rgba(255,255,255,0.02)">
            </div>
            
            <div class="input-group">
                <label>סטים:</label>
                <div class="stepper-container">
                    <button class="stepper-btn" onclick="step('edit-sets', -1)">-</button>
                    <input type="number" id="edit-sets" min="1" max="10" inputmode="numeric">
                    <button class="stepper-btn" onclick="step('edit-sets', 1)">+</button>
                </div>
            </div>
            
            <div class="input-group">
                <label>חזרות:</label>
                <div class="stepper-container">
                    <button class="stepper-btn" onclick="step('edit-reps', -1)">-</button>
                    <input type="number" id="edit-reps" min="1" max="50" inputmode="numeric">
                    <button class="stepper-btn" onclick="step('edit-reps', 1)">+</button>
                </div>
            </div>
            
            <div class="input-group">
                <label>משקל (ק״ג):</label>
                <div class="stepper-container">
                    <button class="stepper-btn" onclick="step('edit-weight', -2.5)">-</button>
                    <input type="number" id="edit-weight" step="0.5" min="0" inputmode="decimal">
                    <button class="stepper-btn" onclick="step('edit-weight', 2.5)">+</button>
                </div>
            </div>
            
            <div style="margin-top: 24px;">
                <button class="btn btn-primary" onclick="saveEditedExercise()">✅ שמור שינויים</button>
                <button class="btn btn-secondary" onclick="closeModal('edit-modal')" style="margin-bottom: 0;">ביטול</button>
            </div>
        </div>
    </div>

    <script>
        // שימוש בפונקציות הקיים שלך מהקוד המקורי
        const DB_URL = 'https://gymo-2093a-default-rtdb.firebaseio.com';
        let workouts = [];
        let currentWorkout = [];
        let editingIndex = null;
        
        // פונקציית עזר החדשה לשינוי ערכים מהיר בסטפרים
        function step(id, amount) {
            const input = document.getElementById(id);
            let val = parseFloat(input.value) || 0;
            val += amount;
            if (val < parseFloat(input.min || 0)) val = parseFloat(input.min);
            input.value = val;
        }

        function editExercise(idx) {
            editingIndex = idx;
            const latestWorkout = workouts[workouts.length - 1];
            const ex = latestWorkout.exercises[idx];
            
            document.getElementById('edit-name').value = ex.name;
            document.getElementById('edit-sets').value = ex.sets;
            document.getElementById('edit-reps').value = ex.reps;
            document.getElementById('edit-weight').value = ex.weight;
            
            openModal('edit-modal');
        }
        
        async function saveEditedExercise() {
            if (editingIndex === null) return;
            const latestWorkout = workouts[workouts.length - 1];
            const ex = latestWorkout.exercises[editingIndex];
            
            const oldSets = ex.sets;
            const oldReps = ex.reps;
            const oldWeight = ex.weight;
            
            ex.sets = parseInt(document.getElementById('edit-sets').value);
            ex.reps = parseInt(document.getElementById('edit-reps').value);
            ex.weight = parseFloat(document.getElementById('edit-weight').value);
            
            if (!ex.history) ex.history = [];
            ex.history.push({
                date: new Date().toISOString(),
                sets: oldSets,
                reps: oldReps,
                weight: oldWeight
            });
            
            await saveData('/workouts', workouts);
            closeModal('edit-modal');
            renderWeekly();
            generateChanges();
            showToast('✅ העדכון נשמר בהצלחה!');
        }
        
        async function fetchData(path) {
            try {
                const res = await fetch(`${DB_URL}${path}.json`);
                if (!res.ok) return null;
                return await res.json();
            } catch(e) { return null; }
        }
        
        async function saveData(path, data) {
            try {
                const res = await fetch(`${DB_URL}${path}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return res.ok ? await res.json() : null;
            } catch(e) { showToast('❌ שגיאה בשמירה'); return null; }
        }
        
        function parseWorkout(text) {
            const lines = text.split('\n').filter(l => l.trim());
            const workout = [];
            lines.forEach((line) => {
                if (line.trim().length < 3) return;
                if (line.includes('+')) {
                    const parts = line.split('+').map(p => p.trim());
                    parts.forEach((part, partIdx) => {
                        const ex = parseExercisePart(part);
                        if (ex) { ex.superset = true; workout.push(ex); }
                    });
                } else {
                    const ex = parseExercisePart(line);
                    if (ex) workout.push(ex);
                }
            });
            return workout;
        }
        
        function parseExercisePart(part) {
            const match = part.match(/(\d+)[×x](\d+)/);
            if (!match) return null;
            const [, reps, sets] = match;
            const weightMatch = part.match(/\((\d+\.?\d*)\)?/);
            const weight = weightMatch ? parseFloat(weightMatch[1]) : 0;
            let name = part.replace(/\d+[×x]\d+/g, '').replace(/\(\d+\.?\d*\)?/g, '').trim();
            if (name.length > 2) {
                return { name, sets: parseInt(sets), reps: parseInt(reps), weight, superset: false };
            }
            return null;
        }
        
        function analyzeWorkout() {
            const text = document.getElementById('coach-message').value.trim();
            if (!text) { showToast('⚠️ נא להדביק הודעה'); return; }
            currentWorkout = parseWorkout(text);
            if (currentWorkout.length === 0) { showToast('❌ לא נמצאו תרגילים תקינים'); return; }
            renderImportReview();
            openModal('import-modal');
        }
        
        function renderImportReview() {
            let html = '';
            let i = 0;
            while (i < currentWorkout.length) {
                const ex = currentWorkout[i];
                if (ex.superset && i + 1 < currentWorkout.length && currentWorkout[i + 1].superset) {
                    const ex1 = currentWorkout[i];
                    const ex2 = currentWorkout[i + 1];
                    html += `
                        <div class="superset-container">
                            <span class="superset-badge">⚡ SUPER SET</span>
                            ${renderReviewCard(ex1, i)}
                            ${renderReviewCard(ex2, i+1)}
                        </div>
                    `;
                    i += 2;
                } else {
                    html += renderReviewCard(ex, i);
                    i += 1;
                }
            }
            document.getElementById('import-list').innerHTML = html;
        }

        function renderReviewCard(ex, index) {
            return `
                <div class="workout-card">
                    <h3>${ex.name}</h3>
                    <div class="details">
                        <div class="detail-item">
                            <div class="detail-label">סטים</div>
                            <input type="number" value="${ex.sets}" onchange="currentWorkout[${index}].sets = parseInt(this.value)" inputmode="numeric" style="padding:4px; margin:0; text-align:center;">
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">חזרות</div>
                            <input type="number" value="${ex.reps}" onchange="currentWorkout[${index}].reps = parseInt(this.value)" inputmode="numeric" style="padding:4px; margin:0; text-align:center;">
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">משקל</div>
                            <input type="number" step="0.5" value="${ex.weight}" onchange="currentWorkout[${index}].weight = parseFloat(this.value)" inputmode="decimal" style="padding:4px; margin:0; text-align:center;">
                        </div>
                    </div>
                </div>`;
        }
        
        async function saveWorkout() {
            workouts.push({ id: 'workout-' + Date.now(), date: new Date().toISOString(), exercises: currentWorkout });
            await saveData('/workouts', workouts);
            closeModal('import-modal');
            document.getElementById('coach-message').value = '';
            renderWeekly();
            generateChanges();
            showToast('✅ האימון נשמר בהצלחה!');
        }
        
        function renderWeekly() {
            if (workouts.length === 0) {
                document.getElementById('weekly-workout').innerHTML = `<div class="empty-state"><p>עדיין אין אימון בשבוע</p><p style="font-size: 12px;">העתק הודעת מאמן כדי להתחיל</p></div>`;
                return;
            }
            const latestWorkout = workouts[workouts.length - 1];
            let html = '';
            let i = 0;
            while (i < latestWorkout.exercises.length) {
                const ex = latestWorkout.exercises[i];
                if (ex.superset && i + 1 < latestWorkout.exercises.length && latestWorkout.exercises[i + 1].superset) {
                    html += `
                        <div class="superset-container">
                            <span class="superset-badge">⚡ SUPER SET</span>
                            ${renderLiveCard(latestWorkout.exercises[i], i)}
                            ${renderLiveCard(latestWorkout.exercises[i+1], i+1)}
                        </div>`;
                    i += 2;
                } else {
                    html += renderLiveCard(ex, i);
                    i += 1;
                }
            }
            document.getElementById('weekly-workout').innerHTML = html;
        }

        function renderLiveCard(ex, index) {
            return `
                <div class="workout-card">
                    <button onclick="editExercise(${index})" class="edit-trigger">✏️</button>
                    <h3>${ex.name}</h3>
                    <div class="details">
                        <div class="detail-item"><div class="detail-label">סטים</div><div class="detail-value">${ex.sets}</div></div>
                        <div class="detail-item"><div class="detail-label">חזרות</div><div class="detail-value">${ex.reps}</div></div>
                        <div class="detail-item"><div class="detail-label">משקל</div><div class="detail-value">${ex.weight} ק״ג</div></div>
                    </div>
                </div>`;
        }
        
        function generateChanges() {
            if (workouts.length === 0) return toggleChangesButtons(false);
            const latestWorkout = workouts[workouts.length - 1];
            let changedExercises = [];
            
            latestWorkout.exercises.forEach(ex => {
                if (ex.history && ex.history.length > 0) {
                    const last = ex.history[ex.history.length - 1];
                    if (last.weight !== ex.weight || last.reps !== ex.reps || last.sets !== ex.sets) {
                        changedExercises.push({ name: ex.name, sets: ex.sets, reps: ex.reps, weight: ex.weight, oldWeight: last.weight, oldReps: last.reps });
                    }
                }
            });
            
            if (changedExercises.length === 0) return toggleChangesButtons(false);
            
            let report = 'היי 🙋‍♂️\n\nהנה השינויים מהשבוע:\n\n';
            changedExercises.forEach(ex => {
                const weightChange = ex.weight > ex.oldWeight ? `⬆️ ${ex.oldWeight}←${ex.weight}` : `${ex.weight}`;
                const repsChange = ex.reps > ex.oldReps ? `⬆️ ${ex.oldReps}←${ex.reps}` : `${ex.reps}`;
                report += `💪 ${ex.name}\n   משקל: ${weightChange}ק״ג | חזרות: ${repsChange}\n\n`;
            });
            report += 'נמשיך ככה! 💪';
            
            toggleChangesButtons(true);
            document.getElementById('changes-summary').innerHTML = `<div class="changes-list">${report.replace(/\n/g, '<br>')}</div>`;
            return report;
        }

        function toggleChangesButtons(show) {
            const display = show ? 'block' : 'none';
            document.getElementById('send-btn').style.display = display;
            document.getElementById('copy-btn').style.display = display;
            if(!show) document.getElementById('changes-summary').innerHTML = `<div class="empty-state"><p>אין שינויים מתועדים עדיין</p></div>`;
        }
        
        function sendToCoach() {
            const report = generateChanges();
            if (report) window.location.href = `https://wa.me/?text=${encodeURIComponent(report)}`;
        }
        
        function copyChanges() {
            const report = generateChanges();
            if (report) {
                navigator.clipboard.writeText(report).then(() => showToast('📋 הדווח הועתק ללוח!'));
            }
        }
        
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        // ניקוי בחירת האינדקס בעת סגירה
        function closeModal(id) { document.getElementById(id).classList.remove('active'); if(id==='edit-modal') editingIndex = null; }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function saveAPIKey() {
            const key = document.getElementById('api-key').value;
            if (key) { localStorage.setItem('api-key', key); showToast('✅ המפתח נשמר מקומית'); }
        }
        
        async function init() {
            const data = await fetchData('/workouts');
            if (data) {
                workouts = Array.isArray(data) ? data : Object.values(data);
                renderWeekly();
                generateChanges();
            }
        }
        window.addEventListener('load', init);
    </script>
</body>
</html>
