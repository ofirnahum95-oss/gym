<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FitPro">
    <title>FitPro - Workout Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        input, textarea, button { -webkit-user-select: text; user-select: text; }

        body {
            background: #0F0F0F;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
            font-size: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 120px;
        }

        h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
        h2 { font-size: 26px; font-weight: 700; margin-bottom: 16px; }
        h3 { font-size: 18px; font-weight: 700; }

        .page { display: none; }
        .page.active { display: block; }

        .btn {
            padding: 14px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #007AFF 0%, #0051D5 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 8px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .metric {
            background: linear-gradient(135deg, rgba(0, 122, 255, 0.1), rgba(0, 212, 255, 0.05));
            border: 1px solid rgba(0, 122, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            flex: 1;
            min-width: 120px;
        }

        .metric-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 28px;
            font-weight: 800;
            color: #FFFFFF;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #FFFFFF;
            text-transform: uppercase;
        }

        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(0, 122, 255, 0.3);
            border-radius: 10px;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 500;
        }

        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            border-color: #007AFF;
            outline: none;
            background: rgba(255, 255, 255, 0.12);
        }

        .input-group input::placeholder,
        .input-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .exercise-item {
            background: linear-gradient(135deg, rgba(0, 122, 255, 0.1), rgba(0, 212, 255, 0.05));
            border: 1px solid rgba(0, 122, 255, 0.3);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exercise-info h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #FFFFFF;
        }

        .exercise-info p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-chest { background: rgba(239, 68, 68, 0.25); color: #ff9999; }
        .badge-back { background: rgba(59, 130, 246, 0.25); color: #a7d8ff; }
        .badge-legs { background: rgba(168, 85, 247, 0.25); color: #dbbcff; }
        .badge-shoulders { background: rgba(234, 179, 8, 0.25); color: #ffd966; }

        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.8), rgba(15, 15, 15, 0.95));
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            padding: 12px;
            text-align: center;
            border: none;
            background: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 11px;
        }

        .nav-item.active {
            color: #007AFF;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            align-items: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1A1A1A;
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-header h3 {
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            color: #FFFFFF;
            font-size: 24px;
            cursor: pointer;
        }

        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .login-screen h1 {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .login-screen p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 32px;
            font-size: 16px;
        }

        .google-signin {
            background: white;
            color: #1f2937;
            font-weight: 700;
            width: 100%;
            max-width: 300px;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #007AFF;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 16px;
            right: 16px;
            background: #1A1A1A;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            z-index: 150;
        }

        @media (min-width: 768px) {
            .navbar {
                position: static;
                flex-direction: column;
                width: 200px;
                height: 100vh;
                border-top: none;
                border-right: 1px solid rgba(255, 255, 255, 0.1);
                justify-content: flex-start;
                padding: 20px 0;
            }

            .nav-item {
                display: flex;
                align-items: center;
                gap: 12px;
                margin: 0 8px;
                padding: 12px 16px;
                border-radius: 8px;
            }

            body {
                display: flex;
                flex-direction: row-reverse;
            }

            .app-content {
                flex: 1;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
        <h1>💪 FitPro</h1>
        <p>Premium Workout Tracker</p>
        <button class="btn btn-primary google-signin" onclick="signInWithGoogle()">
            🔐 Sign in with Google
        </button>
    </div>

    <!-- APP -->
    <div class="app-content" id="appContent" style="display: none;">
        <div class="container">
            <!-- DASHBOARD -->
            <div id="dashboard" class="page active">
                <h1>Dashboard</h1>
                <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 20px;">Welcome back! 💪</p>

                <div class="grid">
                    <div class="metric">
                        <div class="metric-label">Volume This Week</div>
                        <div class="metric-value" id="volume">0</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Workouts</div>
                        <div class="metric-value" id="workout-count">0</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Duration</div>
                        <div class="metric-value" id="avg-duration">0<span style="font-size: 14px;">m</span></div>
                    </div>
                </div>

                <h2>Next Workout</h2>
                <div id="next-workout"></div>

                <button class="btn btn-primary" onclick="openWorkoutModal()" style="margin-top: 20px;">
                    🎯 Start Workout
                </button>
            </div>

            <!-- EXERCISES -->
            <div id="exercises" class="page">
                <h1>Exercises</h1>
                <div id="exercises-list"></div>
                <button class="btn btn-primary" onclick="openExerciseModal()" style="margin-top: 20px;">
                    ➕ Add Exercise
                </button>
            </div>

            <!-- ANALYTICS -->
            <div id="analytics" class="page">
                <h1>Analytics</h1>
                <div class="grid" style="margin-bottom: 20px;">
                    <div class="metric">
                        <div class="metric-label">Total Volume</div>
                        <div class="metric-value" id="analytics-volume">0</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Workouts</div>
                        <div class="metric-value" id="analytics-workouts">0</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Consistency</div>
                        <div class="metric-value" id="analytics-consistency">0%</div>
                    </div>
                </div>
            </div>

            <!-- SETTINGS -->
            <div id="settings" class="page">
                <h1>Settings</h1>
                <div class="card">
                    <h3>👤 User</h3>
                    <p style="color: rgba(255, 255, 255, 0.7); font-size: 14px; margin: 8px 0;" id="user-email">Loading...</p>
                    <button class="btn btn-secondary" onclick="signOut()">Sign Out</button>
                </div>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar" style="display: none;">
        <button class="nav-item active" onclick="switchPage('dashboard')">📊 Dashboard</button>
        <button class="nav-item" onclick="switchPage('exercises')">💪 Exercises</button>
        <button class="nav-item" onclick="switchPage('analytics')">📈 Analytics</button>
        <button class="nav-item" onclick="switchPage('settings')">⚙️ Settings</button>
    </nav>

    <!-- MODALS -->
    <div class="modal" id="workout-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Start Workout</h3>
                <button class="modal-close" onclick="closeModal('workout-modal')">✕</button>
            </div>
            <div id="programs-list"></div>
        </div>
    </div>

    <div class="modal" id="exercise-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Exercise</h3>
                <button class="modal-close" onclick="closeModal('exercise-modal')">✕</button>
            </div>

            <div class="input-group">
                <label>Exercise Name</label>
                <input type="text" id="exercise-name" placeholder="e.g., Bench Press">
            </div>
            <div class="input-group">
                <label>Muscle Group</label>
                <select id="exercise-muscle">
                    <option value="Chest">Chest</option>
                    <option value="Back">Back</option>
                    <option value="Legs">Legs</option>
                    <option value="Shoulders">Shoulders</option>
                </select>
            </div>
            <div class="input-group">
                <label>Sets</label>
                <input type="number" id="exercise-sets" placeholder="4" value="4">
            </div>
            <div class="input-group">
                <label>Min Reps</label>
                <input type="number" id="exercise-min-reps" placeholder="6" value="6">
            </div>
            <div class="input-group">
                <label>Max Reps</label>
                <input type="number" id="exercise-max-reps" placeholder="10" value="10">
            </div>
            <div class="input-group">
                <label>Target Weight (kg)</label>
                <input type="number" id="exercise-weight" placeholder="100" value="100">
            </div>

            <button class="btn btn-primary" onclick="saveExercise()">Add Exercise</button>
            <button class="btn btn-secondary" onclick="closeModal('exercise-modal')">Cancel</button>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCRyiWkSsI5RbFWi-7A_NsSnJW2OGBSJlU",
            authDomain: "gymo-2093a.firebaseapp.com",
            projectId: "gymo-2093a",
            storageBucket: "gymo-2093a.firebasestorage.app",
            messagingSenderId: "585256903236",
            appId: "1:585256903236:web:2893e4904e299f53bbd211"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // STATE
        const state = {
            user: null,
            exercises: [],
            sessions: []
        };

        // AUTH
        auth.onAuthStateChanged(user => {
            if (user) {
                state.user = { id: user.uid, name: user.displayName, email: user.email };
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                document.getElementById('navbar').style.display = 'flex';
                document.getElementById('user-email').textContent = user.email;
                loadUserData();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('appContent').style.display = 'none';
                document.getElementById('navbar').style.display = 'none';
            }
        });

        async function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch (error) {
                alert('Sign in error: ' + error.message);
            }
        }

        function signOut() {
            auth.signOut();
        }

        // DATA
        async function loadUserData() {
            try {
                const exSnap = await db.collection('users').doc(state.user.id).collection('exercises').get();
                state.exercises = exSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                const sesSnap = await db.collection('users').doc(state.user.id).collection('sessions').get();
                state.sessions = sesSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                if (state.exercises.length === 0) await initDemoData();
                
                renderDashboard();
                renderExercises();
                renderPrograms();
            } catch (error) {
                console.error('Load error:', error);
            }
        }

        async function initDemoData() {
            const demos = [
                { name: 'Bench Press', muscleGroup: 'Chest', sets: 4, minReps: 6, maxReps: 10, targetWeight: 100 },
                { name: 'Squats', muscleGroup: 'Legs', sets: 4, minReps: 8, maxReps: 12, targetWeight: 140 },
                { name: 'Deadlifts', muscleGroup: 'Back', sets: 3, minReps: 3, maxReps: 6, targetWeight: 180 },
                { name: 'Pull-ups', muscleGroup: 'Back', sets: 3, minReps: 6, maxReps: 12, targetWeight: 0 }
            ];

            for (const ex of demos) {
                const docRef = await db.collection('users').doc(state.user.id).collection('exercises').add(ex);
                state.exercises.push({ id: docRef.id, ...ex });
            }
        }

        // UI
        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function openExerciseModal() {
            openModal('exercise-modal');
        }

        function openWorkoutModal() {
            openModal('workout-modal');
        }

        async function saveExercise() {
            const ex = {
                name: document.getElementById('exercise-name').value,
                muscleGroup: document.getElementById('exercise-muscle').value,
                sets: parseInt(document.getElementById('exercise-sets').value),
                minReps: parseInt(document.getElementById('exercise-min-reps').value),
                maxReps: parseInt(document.getElementById('exercise-max-reps').value),
                targetWeight: parseInt(document.getElementById('exercise-weight').value)
            };

            if (!ex.name) { alert('Enter exercise name'); return; }

            try {
                const docRef = await db.collection('users').doc(state.user.id).collection('exercises').add(ex);
                state.exercises.push({ id: docRef.id, ...ex });
                closeModal('exercise-modal');
                renderExercises();
                showToast('✅ Exercise added');
                document.getElementById('exercise-name').value = '';
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function renderDashboard() {
            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            const week = state.sessions.filter(s => new Date(s.date) > weekAgo);

            let volume = 0, duration = 0;
            week.forEach(s => {
                volume += s.volume || 0;
                duration += s.duration || 0;
            });

            document.getElementById('volume').textContent = volume.toLocaleString();
            document.getElementById('workout-count').textContent = week.length;
            document.getElementById('avg-duration').textContent = week.length > 0 ? Math.round(duration / week.length) : 0;

            const html = state.exercises.slice(0, 3).map(ex => `
                <div class="exercise-item">
                    <div class="exercise-info">
                        <h3>${ex.name}</h3>
                        <p>${ex.sets}x${ex.minReps}-${ex.maxReps} @ ${ex.targetWeight}kg</p>
                    </div>
                    <span class="badge badge-${ex.muscleGroup.toLowerCase()}">${ex.muscleGroup}</span>
                </div>
            `).join('');

            document.getElementById('next-workout').innerHTML = html;
        }

        function renderExercises() {
            const html = state.exercises.map(ex => `
                <div class="exercise-item">
                    <div class="exercise-info">
                        <h3>${ex.name}</h3>
                        <p>${ex.sets} sets • ${ex.minReps}-${ex.maxReps} reps</p>
                    </div>
                    <span class="badge badge-${ex.muscleGroup.toLowerCase()}">${ex.muscleGroup}</span>
                </div>
            `).join('');

            document.getElementById('exercises-list').innerHTML = html;
        }

        function renderPrograms() {
            const html = `
                <button class="btn btn-secondary" onclick="startWorkout()">Upper Body</button>
                <button class="btn btn-secondary" onclick="startWorkout()">Lower Body</button>
                <button class="btn btn-secondary" onclick="startWorkout()">Full Body</button>
            `;
            document.getElementById('programs-list').innerHTML = html;
        }

        async function startWorkout() {
            closeModal('workout-modal');
            const session = {
                date: new Date(),
                volume: Math.floor(Math.random() * 20000) + 5000,
                duration: 60
            };
            try {
                await db.collection('users').doc(state.user.id).collection('sessions').add(session);
                state.sessions.push(session);
                renderDashboard();
                showToast('✅ Workout saved!');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
